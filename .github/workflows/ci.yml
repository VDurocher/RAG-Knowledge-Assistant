name: CI

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}
          restore-keys: ${{ runner.os }}-pip-

      - name: Install test dependencies
        # sentence-transformers (~500MB, requires torch) is only needed for
        # EMBEDDER_TYPE=local at runtime — skip it in CI to keep builds fast.
        run: |
          pip install \
            "langchain>=0.3.0" \
            "langchain-community>=0.3.0" \
            "langchain-openai>=0.2.0" \
            "langchain-text-splitters>=0.3.0" \
            "faiss-cpu>=1.9.0" \
            "pypdf>=5.0.0" \
            "python-dotenv>=1.0.0" \
            "werkzeug>=3.0.0" \
            pytest

      - name: Run tests
        run: pytest tests/ -v --tb=short
